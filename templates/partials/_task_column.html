<div class="d-flex flex-column align-items-stretch flex-shrink-0 ms-0" style="width: 320px;">
        <div class="task-card d-flex w-100 align-items-center justify-content-between">

          <ul style="list-style-type:none;">
      
            {% for task in object.tasks.all %}

            <li>
              <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#collapseWidthExample" aria-expanded="false" aria-controls="collapseWidthExample">
                <div class="card-body">
                  <h6>
                    {{ task.task_name }}
                  </h6>
                  <p class="card-text">{{ task.description }}</p>
                </div>
              </button>
            </li>

            {% endfor %}

          </ul>

          <div style="min-height: 120px;">
            <div class="collapse collapse-horizontal" id="collapseWidthExample">
              <div class="d-flex flex-column" style="width: 300px;">
                This is some placeholder content for a horizontal collapse. It’s hidden by default and shown when triggered.
              </div>
            </div>
          </div>

        </div>
</div>
